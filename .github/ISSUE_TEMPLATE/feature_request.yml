name: Design proposal
description: Propose a public contract or capability after checking existing issues.
title: "proposal: "
labels:
  - proposal
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the developer problem without prescribing the implementation.
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Proposed contract
      description: Explain the user-facing behavior and ownership boundary.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Compatibility, security, and performance impact
    validations:
      required: true
