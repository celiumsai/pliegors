name: Prepare private CLI draft release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Exact Cargo version tag to prepare, for example v0.0.1
        required: true
        type: string
      confirmation:
        description: Type draft:<tag>, for example draft:v0.0.1
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pliegors-draft-${{ inputs.tag }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PLIEGORS_SOURCE_REV: ${{ github.sha }}

jobs:
  build:
    if: ${{ github.ref == 'refs/heads/main' && inputs.confirmation == format('draft:{0}', inputs.tag) }}
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux x64 (production)
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: pliego
            support: production
          - platform: Linux ARM64 (production)
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: pliego
            support: production
          - platform: macOS x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            binary: pliego
            support: development
          - platform: macOS ARM64
            runner: macos-15
            target: aarch64-apple-darwin
            binary: pliego
            support: development
          - platform: Windows x64 (development)
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            binary: pliego.exe
            support: development
    steps:
      - name: Check out the requested source revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.85.0 --profile minimal --target ${{ matrix.target }}

      - name: Verify release request and distribution contract
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          npm run check:distribution
          $version = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json |
            Select-Object -ExpandProperty packages |
            Where-Object name -eq 'pliego-cli' |
            Select-Object -ExpandProperty version
          $expectedTag = "v$version"
          if ($env:RELEASE_TAG -cne $expectedTag) {
            throw "release tag $env:RELEASE_TAG does not match Cargo version $expectedTag"
          }
          if ($env:RELEASE_CONFIRMATION -cne "draft:$expectedTag") {
            throw "confirmation must be draft:$expectedTag"
          }

      - name: Build release binary
        run: cargo build --locked --release -p pliego-cli --target ${{ matrix.target }}

      - name: Smoke test built CLI
        shell: pwsh
        run: '& "target/${{ matrix.target }}/release/${{ matrix.binary }}" version'

      - name: Package immutable candidate and checksum
        id: package
        shell: pwsh
        run: |
          $version = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json |
            Select-Object -ExpandProperty packages |
            Where-Object name -eq 'pliego-cli' |
            Select-Object -ExpandProperty version
          $stem = "pliego-$version-${{ matrix.target }}"
          $archive = "pliego-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Force "dist/$stem" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/$stem/"
          Copy-Item LICENSE, README.md "dist/$stem/"
          @(
            "version=$version"
            "commit=$env:GITHUB_SHA"
            "target=${{ matrix.target }}"
            "support=${{ matrix.support }}"
          ) | Set-Content -Encoding utf8NoBOM "dist/$stem/RELEASE-METADATA.txt"
          Compress-Archive -Path "dist/$stem/*" -DestinationPath "dist/$archive"
          $hash = (Get-FileHash "dist/$archive" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $archive" | Set-Content -Encoding utf8NoBOM -NoNewline "dist/$archive.sha256"
          "archive=dist/$archive" >> $env:GITHUB_OUTPUT

      - name: Verify candidate checksum
        shell: pwsh
        run: |
          $archive = '${{ steps.package.outputs.archive }}'
          $expected = ((Get-Content -Raw "$archive.sha256") -split '\s+')[0]
          $actual = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -cne $expected) { throw "candidate checksum mismatch" }

      - name: Smoke test Unix installer lifecycle
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/install.sh --archive "${{ steps.package.outputs.archive }}" --install-dir target/installer-smoke
          target/installer-smoke/bin/pliego version
          bash scripts/install.sh --archive "${{ steps.package.outputs.archive }}" --install-dir target/installer-smoke
          bash scripts/install.sh --rollback --install-dir target/installer-smoke
          target/installer-smoke/bin/pliego version
          bash scripts/install.sh --uninstall --install-dir target/installer-smoke
          test ! -e target/installer-smoke/bin/pliego

      - name: Smoke test Windows installer lifecycle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installRoot = 'target/installer-smoke'
          ./scripts/install.ps1 -ArchivePath '${{ steps.package.outputs.archive }}' -InstallDir $installRoot
          & "$installRoot/bin/pliego.exe" version
          ./scripts/install.ps1 -ArchivePath '${{ steps.package.outputs.archive }}' -InstallDir $installRoot
          ./scripts/install.ps1 -Rollback -InstallDir $installRoot
          & "$installRoot/bin/pliego.exe" version
          ./scripts/install.ps1 -Uninstall -InstallDir $installRoot
          if (Test-Path "$installRoot/bin/pliego.exe") { throw 'uninstall left the active binary behind' }

      - name: Store private candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pliegors-candidate-${{ matrix.target }}-${{ github.sha }}
          path: |
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  draft:
    if: ${{ github.ref == 'refs/heads/main' && needs.build.result == 'success' && inputs.confirmation == format('draft:{0}', inputs.tag) }}
    name: Assemble private GitHub draft
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out installer sources
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
          path: source

      - name: Download private candidates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pliegors-candidate-*-${{ github.sha }}
          path: release-assets
          merge-multiple: true

      - name: Verify complete candidate set
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          test "$(find . -maxdepth 1 -name '*.zip' | wc -l)" -eq 5
          test "$(find . -maxdepth 1 -name '*.zip.sha256' | wc -l)" -eq 5
          for checksum in *.zip.sha256; do
            sha256sum --check --strict "$checksum"
          done
          cp ../source/scripts/install.sh ./install.sh
          cp ../source/scripts/install.ps1 ./install.ps1
          primary=(
            install.ps1
            install.sh
            pliego-aarch64-apple-darwin.zip
            pliego-aarch64-unknown-linux-gnu.zip
            pliego-x86_64-apple-darwin.zip
            pliego-x86_64-pc-windows-msvc.zip
            pliego-x86_64-unknown-linux-gnu.zip
          )
          expected=(
            "${primary[@]}"
            pliego-aarch64-apple-darwin.zip.sha256
            pliego-aarch64-unknown-linux-gnu.zip.sha256
            pliego-x86_64-apple-darwin.zip.sha256
            pliego-x86_64-pc-windows-msvc.zip.sha256
            pliego-x86_64-unknown-linux-gnu.zip.sha256
          )
          printf '%s\n' "${expected[@]}" | sort > expected-assets.txt
          find . -maxdepth 1 -type f \( -name '*.zip' -o -name '*.zip.sha256' -o -name 'install.sh' -o -name 'install.ps1' \) \
            -printf '%f\n' | sort > actual-assets.txt
          cmp expected-assets.txt actual-assets.txt
          sha256sum "${primary[@]}" | sort -k2 > SHA256SUMS
          test "$(wc -l < SHA256SUMS)" -eq 7
          rm expected-assets.txt actual-assets.txt

      - name: Create manual draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" \
            >/dev/null 2>release-query-error.txt; then
            echo "Release $RELEASE_TAG already exists; refusing to mutate it." >&2
            exit 1
          fi
          if ! grep -q 'HTTP 404' release-query-error.txt; then
            cat release-query-error.txt >&2
            exit 1
          fi
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" \
            >/dev/null 2>tag-query-error.txt; then
            existing_tag_commit="$(
              gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha
            )"
            if [ "$existing_tag_commit" != "$GITHUB_SHA" ]; then
              echo "Tag $RELEASE_TAG points to $existing_tag_commit, not $GITHUB_SHA." >&2
              exit 1
            fi
          elif ! grep -q 'HTTP 404' tag-query-error.txt; then
            cat tag-query-error.txt >&2
            exit 1
          fi
          cat > release-assets/RELEASE-NOTES.md <<EOF
          PliegoRS CLI candidate built from commit \`$GITHUB_SHA\`.

          - Linux x64 and ARM64: production
          - macOS x64 and ARM64: development
          - Windows x64: development

          This release remains a private draft until it is reviewed and published manually.
          EOF
          gh release create "$RELEASE_TAG" \
            release-assets/*.zip \
            release-assets/*.zip.sha256 \
            release-assets/install.sh \
            release-assets/install.ps1 \
            release-assets/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "PliegoRS $RELEASE_TAG" \
            --notes-file release-assets/RELEASE-NOTES.md \
            --draft \
            --latest=false
