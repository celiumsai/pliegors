name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  ACTIONLINT_VERSION: 1.7.12
  ACTIONLINT_LINUX_AMD64_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
  WASM_BINDGEN_CLI_VERSION: 0.2.126
  # Published digest for the official x86_64-unknown-linux-musl release asset.
  WASM_BINDGEN_CLI_SHA256: 064948d58e2d6c0a745216477a639ba696216d6309aaa902939d1b865b1d869d

jobs:
  quality:
    name: Format, lint, test, and WASM check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: >-
          rustup toolchain install 1.85.0
          --profile minimal
          --component clippy
          --component rustfmt
          --target wasm32-unknown-unknown

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install measurement tooling
        run: npm ci

      - name: Install email Worker tooling
        run: npm ci --prefix workers/pliegors-email

      - name: Install site deployment tooling
        run: npm ci --prefix workers/pliegors-site

      - name: Validate email Worker
        run: npm run check:email-worker

      - name: Audit Node dependencies
        run: |
          npm audit --audit-level=high
          npm audit --prefix workers/pliegors-email --audit-level=high
          npm audit --prefix workers/pliegors-site --audit-level=high

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint all targets
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test workspace
        run: cargo test --workspace --all-targets --locked

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --version 0.22.1 --locked
          cargo audit

      - name: Check Rust documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --locked

      - name: Verify crates.io packages
        run: npm run check:crates

      - name: Lint WASM target
        run: >-
          cargo clippy --target wasm32-unknown-unknown
          -p pliegors-site-client
          -p spike
          --locked
          -- -D warnings

      - name: Reject unowned WASM lifetime escapes
        run: npm run check:wasm-lifetimes

      - name: Check documentation links
        run: npm run check:docs

      - name: Validate GitHub Actions workflows
        shell: bash
        run: |
          set -euo pipefail
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          base="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          curl --fail --silent --show-error --location --remote-name "$base/$archive"
          echo "$ACTIONLINT_LINUX_AMD64_SHA256  $archive" | sha256sum --check --strict -
          mkdir -p "$RUNNER_TEMP/actionlint"
          tar -xzf "$archive" -C "$RUNNER_TEMP/actionlint" actionlint
          "$RUNNER_TEMP/actionlint/actionlint" .github/workflows/*.yml

      - name: Validate official starters through the release CLI
        shell: bash
        run: |
          cargo build -p pliego-cli --locked
          for template in minimal editorial cinematic; do
            project="$GITHUB_WORKSPACE/target/ci-starter-$template"
            "$GITHUB_WORKSPACE/target/debug/pliego" new "$project" \
              --template "$template" \
              --name "CI $template" \
              --framework-path "$GITHUB_WORKSPACE"
            (
              cd "$project"
              CARGO_TARGET_DIR="$GITHUB_WORKSPACE/target/starter-cargo" \
                "$GITHUB_WORKSPACE/target/debug/pliego" check
              CARGO_TARGET_DIR="$GITHUB_WORKSPACE/target/starter-cargo" \
                "$GITHUB_WORKSPACE/target/debug/pliego" build
              CARGO_TARGET_DIR="$GITHUB_WORKSPACE/target/starter-cargo" \
                "$GITHUB_WORKSPACE/target/debug/pliego" inspect
              ledger="target/site/pliego.build.json"
              first_ledger="$RUNNER_TEMP/pliego-$template-first-build.json"
              cp -- "$ledger" "$first_ledger"
              first_sha="$(sha256sum "$ledger" | cut -d ' ' -f 1)"
              CARGO_TARGET_DIR="$GITHUB_WORKSPACE/target/starter-cargo" \
                "$GITHUB_WORKSPACE/target/debug/pliego" build
              CARGO_TARGET_DIR="$GITHUB_WORKSPACE/target/starter-cargo" \
                "$GITHUB_WORKSPACE/target/debug/pliego" inspect
              second_sha="$(sha256sum "$ledger" | cut -d ' ' -f 1)"
              test "$first_sha" = "$second_sha"
              cmp -s -- "$first_ledger" "$ledger"
            )
          done
          node scripts/check-starter-builds.mjs \
            target/ci-starter-minimal \
            target/ci-starter-editorial \
            target/ci-starter-cinematic

      - name: Validate typed content reference
        shell: bash
        run: |
          output="examples/content-collections-pliegors/target/site"
          (
            cd examples/content-collections-pliegors
            "$GITHUB_WORKSPACE/target/debug/pliego" build
            "$GITHUB_WORKSPACE/target/debug/pliego" inspect
          )
          first="$(sha256sum "$output/pliego.build.json" | cut -d ' ' -f 1)"
          (
            cd examples/content-collections-pliegors
            "$GITHUB_WORKSPACE/target/debug/pliego" build
          )
          second="$(sha256sum "$output/pliego.build.json" | cut -d ' ' -f 1)"
          test "$first" = "$second"
          node scripts/check-starter-builds.mjs examples/content-collections-pliegors

      - name: Install pinned wasm-bindgen CLI
        shell: bash
        run: |
          archive="wasm-bindgen-$WASM_BINDGEN_CLI_VERSION-x86_64-unknown-linux-musl.tar.gz"
          base="https://github.com/wasm-bindgen/wasm-bindgen/releases/download/$WASM_BINDGEN_CLI_VERSION"
          curl --fail --silent --show-error --location --remote-name "$base/$archive"
          echo "$WASM_BINDGEN_CLI_SHA256  $archive" | sha256sum --check --strict -
          mkdir -p "$RUNNER_TEMP/wasm-bindgen"
          tar -xzf "$archive" --strip-components=1 -C "$RUNNER_TEMP/wasm-bindgen"
          echo "$RUNNER_TEMP/wasm-bindgen" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/wasm-bindgen/wasm-bindgen" --version

      - name: Test DOM lifecycle in real Chromium
        shell: bash
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
          WASM_BINDGEN_TEST_DRIVER_TIMEOUT: "15"
          WASM_BINDGEN_TEST_TIMEOUT: "120"
          WASM_BINDGEN_TEST_WEBDRIVER_JSON: ${{ github.workspace }}/crates/pliego-dom/tests/webdriver.json
        run: |
          if test -n "${CHROMEWEBDRIVER:-}"; then
            if test -d "$CHROMEWEBDRIVER"; then
              export CHROMEDRIVER="$CHROMEWEBDRIVER/chromedriver"
            else
              export CHROMEDRIVER="$CHROMEWEBDRIVER"
            fi
          else
            CHROMEDRIVER="$(command -v chromedriver)"
            export CHROMEDRIVER
          fi
          test -x "$CHROMEDRIVER"
          "$CHROMEDRIVER" --version
          google-chrome --version
          unset NO_HEADLESS
          cargo test -p pliego-dom \
            --target wasm32-unknown-unknown \
            --test browser_lifecycle \
            --locked \
            --offline \
            -- --nocapture

      - name: Test adapter lifecycle in real Chromium
        shell: bash
        run: |
          if test -n "${CHROMEWEBDRIVER:-}"; then
            if test -d "$CHROMEWEBDRIVER"; then
              export CHROMEDRIVER="$CHROMEWEBDRIVER/chromedriver"
            else
              export CHROMEDRIVER="$CHROMEWEBDRIVER"
            fi
          else
            CHROMEDRIVER="$(command -v chromedriver)"
            export CHROMEDRIVER
          fi
          test -x "$CHROMEDRIVER"
          npm run test:adapters:browser

      - name: Validate the official PliegoRS site
        shell: bash
        run: |
          (
            cd examples/pliegors-site
            "$GITHUB_WORKSPACE/target/debug/pliego" check
            "$GITHUB_WORKSPACE/target/debug/pliego" build
            "$GITHUB_WORKSPACE/target/debug/pliego" inspect
            first="$(sha256sum target/site/pliego.build.json | cut -d ' ' -f 1)"
            "$GITHUB_WORKSPACE/target/debug/pliego" build
            second="$(sha256sum target/site/pliego.build.json | cut -d ' ' -f 1)"
            test "$first" = "$second"
          )
          npm run check:site

      - name: Validate site deployment package
        run: npm run check:site-deployment

      - name: Test Phase 1 measurement tooling
        run: npm run test:phase-1

      - name: Check Phase 1 deterministic contract
        run: npm run check:phase-1
