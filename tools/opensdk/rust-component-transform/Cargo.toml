[package]
name = "pliego-opensdk-rust-component-transform"
version = "0.1.0"
edition = "2021"
rust-version = "1.86"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
serde_json = "1"
wit-bindgen = { version = "=0.41.0", default-features = false, features = ["macros", "realloc"] }

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = "symbols"

[workspace]
