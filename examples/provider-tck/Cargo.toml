# SPDX-License-Identifier: Apache-2.0

[package]
name = "provider-tck"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "provider-tck-native"
path = "src/bin/native.rs"

[[bin]]
name = "provider-tck-pack"
path = "src/bin/pack.rs"

[dependencies]
pliego-pboc = { workspace = true }
pliego-router = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
bytes = { workspace = true }
futures-util = { workspace = true }
pliego-runtime = { workspace = true }
tokio = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
futures-util = { workspace = true }
js-sys = { workspace = true }
pliego-cloudflare = { workspace = true }
worker = { version = "=0.7.5" }
